    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 联系页面的专属样式 */
        .contact-box {
            max-width: 600px;
            margin: 40px auto;
            padding: 30px 35px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            text-align: center;
        }
        .contact-box h2 {
            color: #0077b6;
            font-size: 28px;
            margin-bottom: 20px;
        }
        .contact-box .item {
            font-size: 17px;
            color: #333;
            line-height: 2.2;
            padding: 8px 0;
            border-bottom: 1px dashed #eee;
        }
        .contact-box .item:last-child {
            border-bottom: none;
        }
        .contact-box .item strong {
            color: #0077b6;
            margin-right: 8px;
        }
        .contact-note {
            margin-top: 25px;
            color: #888;
            font-size: 14px;
            border-top: 1px solid #f0f0f0;
            padding-top: 20px;
        }
    </style>
</head>
